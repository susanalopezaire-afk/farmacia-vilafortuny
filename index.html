<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmàcia Vilafortuny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      font-weight: 300;
      background: #f5f5f3;
      min-height: 100vh;
      padding: 2.5rem 1rem;
      color: #111;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .site-header {
      margin-bottom: 1rem;
    }

    .site-name {
      font-family: 'Cormorant SC', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #444;
    }

    .divider {
      border: none;
      border-top: 1px solid #ddd;
      margin-bottom: 1.75rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 2.2rem;
      font-weight: 300;
      color: #111;
      margin-bottom: 1.5rem;
      letter-spacing: 0.01em;
    }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 12px;
      padding: 1.75rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: 'Cormorant SC', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #888;
      margin-bottom: 1.25rem;
    }

    /* Form fields */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-group:last-child { margin-bottom: 0; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #444;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 0.9rem;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.07);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    /* Drag & drop */
    .dropzone {
      border: 1.5px dashed #ccc;
      border-radius: 10px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .dropzone:hover, .dropzone.drag-over {
      border-color: #111;
      background: #f9f9f7;
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      color: #bbb;
    }

    .drop-text {
      font-size: 0.85rem;
      color: #777;
      line-height: 1.5;
    }

    .drop-text strong {
      color: #333;
      font-weight: 600;
    }

    .drop-hint {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 0.25rem;
    }

    /* Images grid */
    .images-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.65rem;
      margin-top: 1rem;
    }

    @media (max-width: 480px) {
      .images-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .img-card {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e5e5e3;
      background: #f0f0ee;
    }

    .img-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .img-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      background: rgba(0,0,0,0.45);
      transition: opacity 0.2s;
    }

    .img-overlay.done { display: none; }

    .img-overlay .img-spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    .img-overlay .img-pct {
      font-size: 0.7rem;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
    }

    .img-overlay.error { background: rgba(155,28,28,0.55); }
    .img-overlay.error::after {
      content: '✕';
      font-size: 1.4rem;
      color: #fff;
    }

    .img-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      color: #333;
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      z-index: 2;
    }

    .img-remove:hover { background: #fff; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.25rem;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .btn-submit:hover { background: #222; }
    .btn-submit:active { transform: scale(0.99); }
    .btn-submit:disabled { background: #999; cursor: not-allowed; }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alerts */
    .alert {
      display: none;
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .alert-success { background: #e6f4ea; color: #1e6b35; border: 1px solid #b7dfbf; }
    .alert-error   { background: #fdecea; color: #9b1c1c; border: 1px solid #f5b7b1; }
  </style>
</head>
<body>
<div class="container">

  <header class="site-header">
    <span class="site-name">Farmàcia Vilafortuny</span>
  </header>

  <hr class="divider" />

  <h1>Nou producte</h1>

  <form id="productForm" novalidate>

    <!-- Informació bàsica -->
    <div class="card">
      <p class="card-title">Informació bàsica</p>

      <div class="form-group">
        <label for="nom">Nom del producte</label>
        <input type="text" id="nom" placeholder="p. ex. Ibuprofèn 400mg" required />
      </div>

      <div class="row">
        <div class="form-group">
          <label for="referencia">Número de referència</label>
          <input type="text" id="referencia" placeholder="p. ex. REF-00123" required />
        </div>
        <div class="form-group">
          <label for="preu">Preu (€)</label>
          <input type="number" id="preu" placeholder="0,00" min="0" step="0.01" required />
        </div>
      </div>

      <div class="form-group">
        <label for="unitats">Unitats disponibles per vendre</label>
        <input type="number" id="unitats" placeholder="0" min="0" step="1" required />
      </div>

      <div class="form-group">
        <label for="descripcio">Descripció del producte</label>
        <textarea id="descripcio" placeholder="Descriu el producte, indicacions, composició..."></textarea>
      </div>
    </div>

    <!-- Imatge del producte -->
    <div class="card">
      <p class="card-title">Imatge del producte</p>

      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" multiple />
        <div class="drop-icon">🖼️</div>
        <p class="drop-text"><strong>Arrossega imatges aquí</strong><br>o fes clic per seleccionar</p>
        <p class="drop-hint">PNG, JPG, WEBP · Múltiples imatges permeses</p>
      </div>

      <div class="images-grid" id="imagesGrid"></div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      <span id="btnText">Desar producte a Notion</span>
      <span class="spinner" id="spinner"></span>
    </button>

    <div class="alert alert-success" id="alertSuccess">✓ Producte desat correctament a Notion!</div>
    <div class="alert alert-error" id="alertError"></div>

  </form>
</div>

<script>
  // ── Config ───────────────────────────────────────────────
  const NOTION_API_KEY    = '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';
  const DATABASE_ID       = '33c6d3859f0d80d68759fe1d4200cd63';
  const NOTION_PROXY      = 'https://corsproxy.io/?' + encodeURIComponent('https://api.notion.com/v1/pages');
  const CLOUDINARY_CLOUD  = 'dciueak8c';
  const CLOUDINARY_PRESET = 'farmacia_vilafortuny';
  const CLOUDINARY_URL    = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`;

  // ── State ────────────────────────────────────────────────
  // Each entry: { id, file, previewUrl, cloudinaryUrl, status: 'uploading'|'done'|'error', pct }
  let images = [];
  let nextId = 0;

  // ── DOM refs ─────────────────────────────────────────────
  const dropzone    = document.getElementById('dropzone');
  const fileInput   = document.getElementById('fileInput');
  const imagesGrid  = document.getElementById('imagesGrid');
  const form        = document.getElementById('productForm');
  const submitBtn   = document.getElementById('submitBtn');
  const btnText     = document.getElementById('btnText');
  const spinner     = document.getElementById('spinner');
  const alertOk     = document.getElementById('alertSuccess');
  const alertErr    = document.getElementById('alertError');

  // ── Render grid ──────────────────────────────────────────
  function renderGrid() {
    imagesGrid.innerHTML = '';
    images.forEach(img => {
      const card = document.createElement('div');
      card.className = 'img-card';
      card.dataset.id = img.id;

      const el = document.createElement('img');
      el.src = img.previewUrl;
      el.alt = img.file.name;
      card.appendChild(el);

      // Overlay
      const overlay = document.createElement('div');
      overlay.className = 'img-overlay' + (img.status === 'done' ? ' done' : img.status === 'error' ? ' error' : '');
      if (img.status === 'uploading') {
        const sp = document.createElement('div');
        sp.className = 'img-spinner';
        const pct = document.createElement('span');
        pct.className = 'img-pct';
        pct.textContent = img.pct + '%';
        overlay.appendChild(sp);
        overlay.appendChild(pct);
      }
      card.appendChild(overlay);

      // Remove button
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'img-remove';
      removeBtn.title = 'Eliminar imatge';
      removeBtn.textContent = '✕';
      removeBtn.addEventListener('click', () => removeImage(img.id));
      card.appendChild(removeBtn);

      imagesGrid.appendChild(card);
    });
  }

  function removeImage(id) {
    const img = images.find(i => i.id === id);
    if (img) URL.revokeObjectURL(img.previewUrl);
    images = images.filter(i => i.id !== id);
    renderGrid();
  }

  // ── Cloudinary upload ────────────────────────────────────
  function uploadToCloudinary(imgEntry) {
    return new Promise((resolve, reject) => {
      const fd = new FormData();
      fd.append('file', imgEntry.file);
      fd.append('upload_preset', CLOUDINARY_PRESET);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', CLOUDINARY_URL, true);

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          imgEntry.pct = Math.round((e.loaded / e.total) * 100);
          renderGrid();
        }
      };

      xhr.onload = () => {
        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          resolve(data.secure_url);
        } else {
          const err = JSON.parse(xhr.responseText || '{}');
          reject(new Error(err.error?.message || 'Error pujant'));
        }
      };

      xhr.onerror = () => reject(new Error('Error de xarxa'));
      xhr.send(fd);
    });
  }

  async function processFiles(files) {
    const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (!validFiles.length) return;

    const entries = validFiles.map(file => ({
      id: nextId++,
      file,
      previewUrl: URL.createObjectURL(file),
      cloudinaryUrl: null,
      status: 'uploading',
      pct: 0
    }));

    images = [...images, ...entries];
    renderGrid();

    // Upload all in parallel
    await Promise.all(entries.map(async (entry) => {
      try {
        entry.cloudinaryUrl = await uploadToCloudinary(entry);
        entry.status = 'done';
        entry.pct = 100;
      } catch {
        entry.status = 'error';
      }
      renderGrid();
    }));
  }

  // ── Drag & drop events ───────────────────────────────────
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) processFiles(fileInput.files);
    fileInput.value = '';
  });

  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('drag-over');
  });

  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));

  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
  });

  // ── Helpers ──────────────────────────────────────────────
  function setLoading(on) {
    submitBtn.disabled = on;
    btnText.textContent = on ? 'Desant...' : 'Desar producte a Notion';
    spinner.style.display = on ? 'block' : 'none';
  }

  function showAlert(type, msg) {
    alertOk.style.display = 'none';
    alertErr.style.display = 'none';
    if (type === 'success') {
      alertOk.style.display = 'block';
    } else {
      alertErr.textContent = '✕ ' + msg;
      alertErr.style.display = 'block';
    }
  }

  // ── Form submit ──────────────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const nom        = document.getElementById('nom').value.trim();
    const referencia = document.getElementById('referencia').value.trim();
    const preu       = parseFloat(document.getElementById('preu').value);
    const unitats    = parseInt(document.getElementById('unitats').value, 10);
    const descripcio = document.getElementById('descripcio').value.trim();

    if (!nom || !referencia || isNaN(preu) || isNaN(unitats)) {
      showAlert('error', 'Omple tots els camps obligatoris.');
      return;
    }

    const uploading = images.filter(i => i.status === 'uploading');
    if (uploading.length) {
      showAlert('error', 'Espera que acabin de pujar totes les imatges.');
      return;
    }

    setLoading(true);
    alertOk.style.display = 'none';
    alertErr.style.display = 'none';

    const properties = {
      'Nom del producte':               { title:     [{ text: { content: nom } }] },
      'Número de referència':           { rich_text: [{ text: { content: referencia } }] },
      'Preu (€)':                       { number: preu },
      'Unitats disponibles per vendre': { number: unitats },
      'Descripció del producte':        { rich_text: [{ text: { content: descripcio } }] }
    };

    const doneImages = images.filter(i => i.status === 'done' && i.cloudinaryUrl);
    if (doneImages.length) {
      properties['Imatge del producte'] = {
        files: doneImages.map(i => ({
          name: i.file.name,
          type: 'external',
          external: { url: i.cloudinaryUrl }
        }))
      };
    }

    try {
      const res = await fetch(NOTION_PROXY, {
        method: 'POST',
        headers: {
          'Authorization':  'Bearer ' + NOTION_API_KEY,
          'Notion-Version': '2022-06-28',
          'Content-Type':   'application/json'
        },
        body: JSON.stringify({ parent: { database_id: DATABASE_ID }, properties })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'Error ' + res.status);
      }

      showAlert('success');
      form.reset();
      images.forEach(i => URL.revokeObjectURL(i.previewUrl));
      images = [];
      renderGrid();
    } catch (err) {
      showAlert('error', err.message || 'Error de connexió. Torna-ho a intentar.');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
